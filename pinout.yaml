# Waveshare ESP32-S3 Audio Board Pin Map
# https://www.waveshare.com/esp32-s3-audio-board.htm
# https://www.waveshare.com/wiki/ESP32-S3-AUDIO-Board
#
# Machine-readable pin mapping for ESPHome and other frameworks.
# Derived from official Waveshare demo source code and schematics.

board:
  name: "Waveshare ESP32-S3 Audio Board"
  mcu: ESP32-S3R8
  variant: esp32s3
  board_id: esp32-s3-devkitc-1
  flash: 16MB
  flash_mode: QIO
  flash_speed: 80MHz
  psram: 8MB
  psram_mode: octal
  psram_speed: 80MHz
  sram: 512KB
  rom: 384KB
  wifi: "2.4GHz 802.11 b/g/n"
  bluetooth: "5 (LE)"
  framework: ESP-IDF

i2c:
  scl: GPIO10
  sda: GPIO11
  frequency: 100kHz  # community default; IDF demo uses 400kHz
  devices:
    - name: "ES8311 Audio DAC"
      address: 0x18
    - name: "ES7210 Audio ADC"
      address: 0x40
    - name: "TCA9555 I/O Expander"
      address: 0x20
    - name: "PCF85063 RTC"
      address: 0x51

i2s:
  mclk: GPIO12
  bclk: GPIO13
  lrclk: GPIO14
  din: GPIO15       # Microphone data (ES7210 ADC -> ESP32)
  dout: GPIO16      # Speaker data (ESP32 -> ES8311 DAC)

audio:
  adc:
    chip: ES7210
    type: "4-channel audio ADC"
    i2c_address: 0x40
    bits_per_sample: 16
    sample_rate: 16000
  dac:
    chip: ES8311
    type: "Low-power mono audio codec"
    i2c_address: 0x18
    bits_per_sample: 16
    sample_rate: 16000
  amplifier:
    chip: NS4150B
    type: "Mono Class-D speaker amplifier"
    enable_pin:
      io_expander: TCA9555
      pin: 8         # EXIO08 / P1_0
      active_high: true

led_ring:
  type: WS2812B-0807
  gpio: GPIO38
  num_leds: 7
  color_order: GRB

buttons:
  boot:
    gpio: GPIO0
    active_low: true
    note: "Standard ESP32 boot button"
  key1:
    io_expander: TCA9555
    pin: 10          # EXIO10 / P1_2
    active_low: true
  key2:
    io_expander: TCA9555
    pin: 10          # EXIO10 / P1_2 (confirm mapping for your board revision)
    active_low: true
  key3:
    io_expander: TCA9555
    pin: 11          # EXIO11 / P1_3
    active_low: true

rtc:
  chip: PCF85063
  i2c_address: 0x51

battery:
  adc_pin: GPIO8    # Shared with SPI MISO

usb:
  type: USB-C
  d_minus: GPIO19
  d_plus: GPIO20
  note: "When EXIO7 is LOW, USB is unavailable"

lcd:
  # 18-pin FPC connector, supports multiple displays
  cs: GPIO3
  sclk: GPIO4
  backlight: GPIO5
  # QSPI mode pins
  sda0: GPIO9       # Also SPI MOSI
  sda1: GPIO8       # Also SPI MISO
  sda2: GPIO7       # Also SPI DC in standard SPI mode
  sda3: GPIO6
  reset:
    io_expander: TCA9555
    pin: 0           # EXIO00
  touch_reset:
    io_expander: TCA9555
    pin: 1           # EXIO01
  touch_interrupt:
    io_expander: TCA9555
    pin: 2           # EXIO02
  compatible_displays:
    - "1.47\" JD9853"
    - "1.85\" ST77916 (QSPI)"
    - "2\" ST7789"
    - "2.8\" ST7789"
    - "3.5\" ST7796"

sd_card:
  mode: "SDMMC 1-bit"
  clk: GPIO40
  cmd: GPIO42
  d0: GPIO41
  cs:
    io_expander: TCA9555
    pin: 3           # EXIO03

camera:
  interface: DVP
  compatible: ["OV2640", "OV5640"]
  xclk: GPIO43
  pclk: GPIO44
  vsync: GPIO21
  href: GPIO1
  d0: GPIO2
  d1: GPIO17
  d2: GPIO18
  d3: GPIO39
  d4: GPIO45
  d5: GPIO46
  d6: GPIO47
  d7: GPIO48
  siod: GPIO11       # Shared I2C SDA
  sioc: GPIO10       # Shared I2C SCL
  power_down:
    io_expander: TCA9555
    pin: 5           # EXIO05 (active low)
  camera_select:
    io_expander: TCA9555
    pin: 6           # EXIO06 (HIGH=Tx/Rx for camera, LOW=USB)
  hardware_reset:
    io_expander: TCA9555
    pin: 7           # EXIO07 (inverted)

io_expander:
  chip: TCA9555PWR
  i2c_address: 0x20  # A0=A1=A2=GND
  port0:
    pin0: "LCD Reset"
    pin1: "Touch Panel Reset"
    pin2: "Touch Panel Interrupt"
    pin3: "SD Card CS"
    pin4: "Reserved"
    pin5: "Camera Power Down (active low)"
    pin6: "Camera Select (HIGH=Tx/Rx, LOW=USB)"
    pin7: "Camera/USB GPIO mux control"
  port1:
    pin8: "PA_CTRL - Speaker amplifier enable"
    pin9: "Key1 button (active low)"
    pin10: "Key2 button (active low)"
    pin11: "Key3 button (active low)"
    pin12: "Expansion header"
    pin13: "Expansion header"
    pin14: "Expansion header"
    pin15: "Expansion header"

power:
  input: "USB 5V Type-C"
  regulator: "MP1605GTF-Z 3.3V/2A DC-DC buck"
  battery_connector: "MX1.25 2-pin, 3.7V lithium"
  battery_switch: true
  rtc_battery_header: true
