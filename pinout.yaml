# Waveshare ESP32-S3 Audio Board Pin Map
# https://www.waveshare.com/esp32-s3-audio-board.htm
# https://www.waveshare.com/wiki/ESP32-S3-AUDIO-Board
#
# Machine-readable pin mapping for ESPHome and other frameworks.
# Derived from the official Waveshare interfaces diagram.

board:
  name: "Waveshare ESP32-S3 Audio Board"
  mcu: ESP32-S3
  flash: 16MB
  psram: 8MB (Octal)
  framework: ESP-IDF

i2c:
  bus_id: standard
  scl: GPIO10
  sda: GPIO11
  frequency: 50kHz
  devices:
    - name: "TCA9555 I/O Expander"
      address: 0x20
    - name: "ES8311 Audio DAC"
      address: 0x18
    - name: "ES7210 Audio ADC"
      address: 0x40
    - name: "PCF85063 RTC"
      address: 0x51

i2s:
  bus_id: i2s_audio_bus
  mclk: GPIO12
  bclk: GPIO13
  lrclk: GPIO14
  din: GPIO15    # Microphone data (ES7210 ADC -> ESP32)
  dout: GPIO16   # Speaker data (ESP32 -> ES8311 DAC)

audio:
  adc:
    chip: ES7210
    type: "Quad-channel audio ADC"
    bits_per_sample: 16
    sample_rate: 16000
  dac:
    chip: ES8311
    type: "Low-power mono audio codec"
    bits_per_sample: 16
    sample_rate: 16000

speaker:
  amplifier_enable:
    io_expander: TCA9555
    pin: 8         # EXIO09
    active_high: true

led_ring:
  type: WS2812
  gpio: GPIO38
  num_leds: 7
  color_order: RGB

buttons:
  key1_vol_down:
    io_expander: TCA9555
    pin: 9         # EXIO10
    active_low: true
  key2_assist:
    io_expander: TCA9555
    pin: 10        # EXIO11
    active_low: true
  key3_vol_up:
    io_expander: TCA9555
    pin: 11        # EXIO12
    active_low: true

rtc:
  chip: PCF85063
  i2c_address: 0x51

io_expander:
  chip: TCA9555
  i2c_address: 0x20
  pins:
    EXIO00: 0
    EXIO01: 1
    EXIO02: 2
    EXIO03: 3
    EXIO04: 4
    EXIO05: 5
    EXIO06: 6
    EXIO07: 7
    EXIO08: 8    # Speaker amplifier enable
    EXIO09: 9    # Key1 - Volume Down
    EXIO10: 10   # Key2 - Assist
    EXIO11: 11   # Key3 - Volume Up
    EXIO12: 12
    EXIO13: 13
    EXIO14: 14
    EXIO15: 15
